<body>

                <i class="fa-solid fa-cloud-sun-rain"></i> <Strong>WEATHER</Strong>

                <span class="bar"></span>

            <ul class="navbar__menu">

<div class="body">
    <div class="container">
        <header>
            <h1>Barangay Patas Status Reporting System</h1>
            <p>Report the status of your barangay in real-time</p>
        </header>

        <main>
            <section class="form-section">
                <h2>Submit Status Report</h2>
                <form id="reportForm">
                    <div class="form-group">
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" placeholder="Enter your name" required>
                    </div>

                 

            

                    <div class="form-group">
                        <label for="message">Situation/Message</label>
                        <textarea id="message" name="message" rows="4" placeholder="Describe the current situation..." required></textarea>
                    </div>

                    <button type="submit" class="submit-btn">
                        Submit Report
                    </button>
                </form>
            </section>

            <!-- Reports Display -->
            <section class="reports-section">
                <h2>Recent Reports</h2>
                <div id="reportsContainer" class="reports-container">
                    <!-- Reports will be dynamically added here -->
                </div>
            </section>
        </main>
    </div>
</div>


    <script src="reports.js"></script>
</body>
</html>

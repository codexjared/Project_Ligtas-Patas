<div class="body">
    <div class="container">
        <header>
            <h1>Barangay Patas Status Reporting System</h1>
            <p>Report the status of your barangay in real-time.</p>
        </header>

        <main>
            <section class="form-section">
                <h2>Submit Status Report</h2>
                <form id="reportForm">
                    <div class="form-group">
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" placeholder="Enter your name" required>
                    </div>

                    <div class="form-group">
                        <label for="barangay">Barangay</label>
                        <select id="barangay" name="barangay" required>
                            <option value="">Select Place</option>
                            <option value="Patas Covered Court">Patas Covered Court</option>
                            <option value="Patas Elementary School">Patas Elementary School</option>
                            <option value="Tahik B">Tahik B</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="status">Status</label>
                        <select id="status" name="status" required>
                            <option value="">Select Status</option>
                            <option value="Safe" id="safeadmin">Safe ✅</option>
                            <option value="Needs Assistance">Needs Assistance ❗</option>
                            <option value="Emergency">Emergency ⚠️</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="message">Situation/Message</label>
                        <textarea id="message" name="message" rows="4" placeholder="Describe the current situation..." required></textarea>
                    </div>

                    <button type="submit" class="submit-btn">
                        Submit Report
                    </button>
                </form>
            </section>

            <section class="reports-section">
                <h2>Recent Reports</h2>
                <div id="reportsContainer" class="reports-container">
                </div>
            </section>
        </main>
    </div>
</div>

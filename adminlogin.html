<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ligtas-Patas</title>
    <link rel="stylesheet" href="loginstyle.css" />
    <script src="https://kit.fontawesome.com/d65d73018d.js" crossorigin="anonymous"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kumbh+Sans:wght@400;700&display=swap" rel="stylesheet"> 
</head>
<body>

    <!-- Navbar Section -->
    <nav class="navbar">
        <div class="navbar__container">
            <a href="/" id="navbar__logo"> 
                <i class="fa-solid fa-cloud-sun-rain"></i> <Strong>WEATHER</Strong>
            </a>
            <div class="navbar__toggle" id="mobile-menu">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
            <ul class="navbar__menu">
                <li class="navbar__item">
                    <a href="./home.html" class="navbar__links">
                        <i class="fa-slab fa-regular fa-house"></i>
                    </a>
                </li>
                <li class="navbar__item">
                    <a href="/" class="navbar__links">
                        <i class="fa-solid fa-phone"></i>
                    </a>
                </li>
                <li class="navbar__item">
                    <a href="/" class="navbar__links">
                        <i class="fa-solid fa-walkie-talkie"></i>
                    </a>
                </li>
                <li class="navbar__item">
                    <a href="/" class="navbar__links">About</a>
                </li>
                <li class="navbar__btn">
                    <a href="/" class="button">Log In</a>
                </li>
            </ul>
        </div>
    </nav>

    <!-- Login Section -->
    <div class="main-login">
        <div class="container"> 
        <div class="form-box login">
            <form action="">
                <h1>Admin Login</h1>
                <div class="input-box">
                    <input type="text" placeholder="Username" id="username" required>
                    <i class="fa-solid fa-user"></i>
                </div>
                <div class="input-box">
                    <input type="text" placeholder="Password" id="password" required>
                    <i class="fa-solid fa-eye"></i>
                </div>
                <div class="forgot-link">
                    <a href="#">Forgot Password?</a>
                </div>
                <button type="submit" class="btn" id="login">Login</button>
            </form>
        </div>

        <div class="toggle-box">
            <div class="toggle-panel">
                <h1>Hello, Welcome Admin!</h1>
                <p>This is for only Admin Official.</p>
            </div>
        </div>
    </div>
    
    <!-- Error Modal -->
    <div id="errorModal" class="modal">
        <div class="modal-content"> 
            <p>Invalid username or password!</p>
            <button id="closeBtn">OK</button>
        </div>
    </div>


    <script src="app.js"></script>
    <script src="login.js"></script>
</body> 
</html>
